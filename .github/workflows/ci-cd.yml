name: .NET Core CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      # ใช้คำสั่งหาไฟล์ sln อัตโนมัติ เพื่อป้องกันปัญหาเรื่อง Path
      run: dotnet restore $(find src -name "*.sln")

    - name: Build
      run: dotnet build $(find src -name "*.sln") --no-restore -c Release

    - name: Run Unit Tests
      run: dotnet test $(find src -name "*.sln") --no-build -c Release --verbosity normal