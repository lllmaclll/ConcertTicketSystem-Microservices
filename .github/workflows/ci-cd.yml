name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # --- ส่วนที่ 1: ตรวจสอบความถูกต้องของโค้ด (เหมือนเดิม) ---
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore $(find src -name "*.sln")

    - name: Build
      run: dotnet build $(find src -name "*.sln") --no-restore -c Release

    - name: Run Unit Tests
      run: dotnet test $(find src -name "*.sln") --no-build -c Release --verbosity normal

    # --- ส่วนที่ 2: Build และส่ง Image ขึ้น Docker Hub (เพิ่มใหม่) ---
    - name: Login to Docker Hub
      if: github.event_name != 'pull_request' && success() # ไม่รันถ้าเป็น PR และต้องเทสผ่านก่อน
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Service A
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: ./src/ServiceA
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-service-a:latest

    - name: Build and Push Frontend
      if: success()
      uses: docker/build-push-action@v5
      with:
        context: ./src/frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-frontend:latest